<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark void background -->
  <rect width="64" height="64" fill="#0a0806" rx="8"/>
  <!-- Ember stage light, vertical beam -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4821a" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#c45a10" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7a2e08" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="32" cy="32" r="28" fill="url(#glow)"/>
  <!-- Inner stage light: a thin vertical beam in ember -->
  <rect x="28" y="12" width="8" height="40" fill="#c45a10" rx="1"/>
  <!-- Hot core -->
  <rect x="30" y="14" width="4" height="36" fill="#d4b87a" rx="1"/>
  <!-- Tiny filament dots above and below -->
  <circle cx="32" cy="10" r="1.5" fill="#d4821a"/>
  <circle cx="32" cy="54" r="1.5" fill="#d4821a"/>
</svg>
